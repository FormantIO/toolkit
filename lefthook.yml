# https://lefthook.dev/configuration/
pre-commit:
  commands:
    prettier-data-sdk:
      root: packages/data-sdk/
      glob: "packages/data-sdk/src/**/*.{ts,tsx,js,jsx,json,md,yml,yaml}"
      run: npx prettier --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    prettier:
      root: packages/data-sdk/
      run: npm run lint:prettier
    eslint:
      root: packages/data-sdk/
      run: npm run lint:eslint
