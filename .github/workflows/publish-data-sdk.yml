---
name: Publish @formant/data-sdk

on:
  push:
    branches: [master]
    paths:
      - "packages/data-sdk/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build + pack, do not publish)"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

jobs:
  publish-data-sdk:
    name: Publish @formant/data-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/data-sdk/package-lock.json

      - name: Install dependencies
        working-directory: packages/data-sdk
        run: npm ci

      - name: Build
        working-directory: packages/data-sdk
        run: |
          npm run build
          npm run types

      - name: Read version from package.json
        id: version
        working-directory: packages/data-sdk
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Version from package.json: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Guard against backward or duplicate version
        id: guard
        run: |
          TARGET="${{ steps.version.outputs.VERSION }}"
          LATEST=$(npm view @formant/data-sdk dist-tags.latest 2>/dev/null || echo "0.0.0")
          echo "Target version: ${TARGET} | npm 'latest': ${LATEST}"
          if npm view "@formant/data-sdk@${TARGET}" version >/dev/null 2>&1; then
            echo "::notice::${TARGET} already on npm — nothing to publish. Bump packages/data-sdk/package.json to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HIGHEST=$(printf '%s\n%s\n' "${TARGET}" "${LATEST}" | sort -V | tail -1)
          if [ "${TARGET}" != "${HIGHEST}" ]; then
            echo "::error::Refusing to publish ${TARGET}: npm 'latest' is already ${LATEST}. Bump packages/data-sdk/package.json above ${LATEST}."
            exit 1
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Verify package contents
        if: ${{ steps.guard.outputs.skip != 'true' }}
        working-directory: packages/data-sdk
        run: npm pack --dry-run 2>&1

      - name: Publish
        if: ${{ steps.guard.outputs.skip != 'true' && inputs.dry_run != true }}
        working-directory: packages/data-sdk
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NPM_PUBLISH_TOKEN}"
          npm publish --access public

      - name: Publish (dry run)
        if: ${{ steps.guard.outputs.skip != 'true' && inputs.dry_run == true }}
        working-directory: packages/data-sdk
        run: |
          npm publish --access public --dry-run
