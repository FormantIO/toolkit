---
name: Publish @formant/data-sdk

on:
  repository_dispatch:
    types: [publish-data-sdk]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.345.5). Leave empty to use package.json version."
        required: false
        type: string
      dry_run:
        description: "Dry run (do not actually publish)"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

jobs:
  publish-data-sdk:
    name: Publish @formant/data-sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: packages/data-sdk/package-lock.json

      - name: Install dependencies
        working-directory: packages/data-sdk
        run: npm ci

      - name: Build
        working-directory: packages/data-sdk
        run: |
          npm run build
          npm run types

      - name: Determine version
        id: version
        run: |
          # Priority: workflow_dispatch input > repository_dispatch payload > package.json
          VERSION="${{ inputs.version || '' }}"
          if [ -z "$VERSION" ] && [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version || '' }}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION=$(node -p "require('./packages/data-sdk/package.json').version")
            echo "Using package.json version: $VERSION"
          else
            echo "Using provided version: $VERSION"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Guard against backward or duplicate version
        id: guard
        # Only meaningful for real publishes; dry runs never touch the registry.
        if: ${{ github.event_name == 'repository_dispatch' || inputs.dry_run != true }}
        run: |
          TARGET="${{ steps.version.outputs.VERSION }}"
          LATEST=$(npm view @formant/data-sdk dist-tags.latest 2>/dev/null || echo "0.0.0")
          echo "Target version: ${TARGET} | npm 'latest': ${LATEST}"
          # Idempotent re-runs: if this exact version is already published, skip cleanly.
          if npm view "@formant/data-sdk@${TARGET}" version >/dev/null 2>&1; then
            echo "::notice::${TARGET} is already on npm — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Refuse to move the 'latest' tag backward (this is what was failing in CI).
          HIGHEST=$(printf '%s\n%s\n' "${TARGET}" "${LATEST}" | sort -V | tail -1)
          if [ "${TARGET}" != "${HIGHEST}" ]; then
            echo "::error::Refusing to publish ${TARGET}: npm 'latest' is already ${LATEST}. Bump above ${LATEST}, or publish under a dist-tag with --tag."
            exit 1
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Set package version
        if: ${{ steps.guard.outputs.skip != 'true' }}
        working-directory: packages/data-sdk
        run: npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version --allow-same-version

      - name: Verify package contents
        if: ${{ steps.guard.outputs.skip != 'true' }}
        working-directory: packages/data-sdk
        run: npm pack --dry-run 2>&1

      - name: Publish
        if: ${{ (github.event_name == 'repository_dispatch' || inputs.dry_run != true) && steps.guard.outputs.skip != 'true' }}
        working-directory: packages/data-sdk
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NPM_PUBLISH_TOKEN}"
          npm publish --access public

      - name: Publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        working-directory: packages/data-sdk
        run: |
          npm publish --access public --dry-run
