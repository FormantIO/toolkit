name: CI Checks

on:
    pull_request:
    workflow_dispatch: {}

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    data-sdk:
        name: data-sdk
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "npm"
                  cache-dependency-path: packages/data-sdk/package-lock.json

            - name: Install dependencies
              working-directory: packages/data-sdk
              run: npm ci

            - name: lefthook
              working-directory: packages/data-sdk
              run: npx lefthook run pre-push --all-files

            - name: Run unit tests
              working-directory: packages/data-sdk
              run: npm test

            - name: Type check
              working-directory: packages/data-sdk
              run: npm run types:check
